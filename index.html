<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fbff 0%, #e6f0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 102, 255, 0.12);
            padding: 40px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            font-size: 48px;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            color: #0b3d91;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            color: #64748b;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            color: #0b3d91;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .mode-btn:hover {
            border-color: #2563eb;
            background: #f0f6ff;
        }

        .mode-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .mode-btn i {
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #0b3d91;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-label i {
            font-size: 18px;
            color: #2563eb;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #0b3d91;
            font-weight: 500;
        }

        .file-input-label:hover {
            border-color: #2563eb;
            background: #f0f6ff;
        }

        .file-input-label i {
            font-size: 24px;
            color: #2563eb;
        }

        .file-name {
            display: inline-block;
            padding: 6px 12px;
            background: #dbeafe;
            color: #0b3d91;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .password-container {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #2563eb;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            transform: translateY(-2px);
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
        }

        .action-btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            box-shadow: none;
        }

        .action-btn i {
            font-size: 20px;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .action-btn {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">
                    <i class="material-icons" style="font-size: 48px;">security</i>
                </div>
                <h1>Secure File Vault</h1>
                <p>Encrypt and decrypt your files securely</p>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="encrypt" onclick="setMode('encrypt')">
                    <i class="material-icons">lock</i>
                    Encrypt
                </button>
                <button class="mode-btn" data-mode="decrypt" onclick="setMode('decrypt')">
                    <i class="material-icons">lock_open</i>
                    Decrypt
                </button>
            </div>

            <form onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">
                        <i class="material-icons">upload_file</i>
                        Select File
                    </label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" onchange="handleFileSelect(event)">
                        <label for="fileInput" class="file-input-label">
                            <i class="material-icons">cloud_upload</i>
                            <span>Choose or drag file</span>
                        </label>
                        <div id="fileName" class="file-name" style="display: none;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="material-icons">vpn_key</i>
                        Password
                    </label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="passwordInput" 
                            placeholder="Enter a secure password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="material-icons" id="toggleIcon">visibility</i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="action-btn" id="submitBtn">
                    <i class="material-icons">check_circle</i>
                    <span id="submitText">Encrypt File</span>
                </button>
            </form>

            <div id="message"></div>
            <div class="info-text">
                AES-256 encryption | PBKDF2 key derivation | Secure & private
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'encrypt';
        let selectedFile = null;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            document.getElementById('submitText').textContent = 
                mode === 'encrypt' ? 'Encrypt File' : 'Decrypt File';
            clearMessage();
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const fileNameEl = document.getElementById('fileName');
                fileNameEl.textContent = `📄 ${selectedFile.name}`;
                fileNameEl.style.display = 'inline-block';
            }
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function clearMessage() {
            document.getElementById('message').innerHTML = '';
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.className = `message ${type}`;
            messageEl.textContent = text;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            console.log('[SUBMIT] Form submitted', { currentMode, selectedFile, passwordLength: document.getElementById('passwordInput').value.length });

            if (!selectedFile) {
                showMessage('Please select a file.', 'error');
                console.warn('[SUBMIT] No file selected');
                return;
            }

            const password = document.getElementById('passwordInput').value;
            if (!password) {
                showMessage('Please enter a password.', 'error');
                console.warn('[SUBMIT] No password entered');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';

            try {
                console.log('[SUBMIT] Reading file as ArrayBuffer...');
                const buffer = await selectedFile.arrayBuffer();
                console.log('[SUBMIT] File size:', buffer.byteLength, 'bytes');
                
                console.log('[SUBMIT] Converting to base64 (chunked for large files)...');
                const bytes = new Uint8Array(buffer);
                let base64 = '';
                const chunkSize = 8192; // Process in 8KB chunks to avoid stack overflow
                for (let i = 0; i < bytes.length; i += chunkSize) {
                    const chunk = bytes.subarray(i, i + chunkSize);
                    base64 += String.fromCharCode.apply(null, Array.from(chunk));
                }
                base64 = btoa(base64);
                console.log('[SUBMIT] Base64 length:', base64.length);

                const requestBody = {
                    fileName: selectedFile.name,
                    fileData: base64,
                    password: password
                };
                console.log('[SUBMIT] Request body prepared', { fileName: selectedFile.name, fileDataLength: base64.length, passwordLength: password.length });
                console.log('[SUBMIT] Sending POST to /api/' + currentMode);

                const response = await fetch(`/api/${currentMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                console.log('[SUBMIT] Response status:', response.status, response.statusText);
                const contentType = response.headers.get('content-type');
                console.log('[SUBMIT] Response content-type:', contentType);
                
                const responseText = await response.text();
                console.log('[SUBMIT] Raw response:', responseText.substring(0, 200));
                
                const result = JSON.parse(responseText);
                console.log('[SUBMIT] Parsed response:', { success: result.success, hasMessage: !!result.message, hasdFileName: !!result.fileName, fileDataLength: result.fileData ? result.fileData.length : 0 });

                if (result.success) {
                    console.log('[SUBMIT] Decoding result base64...');
                    const blob = new Blob([Uint8Array.from(atob(result.fileData), c => c.charCodeAt(0))]);
                    console.log('[SUBMIT] Creating download link...');
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = result.fileName;
                    console.log('[SUBMIT] Triggering download as:', result.fileName);
                    link.click();
                    URL.revokeObjectURL(link.href);

                    showMessage(`✓ ${currentMode === 'encrypt' ? 'File encrypted' : 'File decrypted'} successfully!`, 'success');
                    document.getElementById('fileInput').value = '';
                    selectedFile = null;
                    document.getElementById('fileName').style.display = 'none';
                    console.log('[SUBMIT] Operation completed successfully');
                } else {
                    console.error('[SUBMIT] Server returned error:', result.message);
                    showMessage(`Error: ${result.message || 'Unknown error from server'}`, 'error');
                }
            } catch (error) {
                console.error('[SUBMIT] Exception caught:', error.message, error.stack);
                showMessage(`Error: ${error.message || 'Operation failed'}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="material-icons">check_circle</i><span id="submitText">' + 
                    (currentMode === 'encrypt' ? 'Encrypt File' : 'Decrypt File') + '</span>';
                console.log('[SUBMIT] Button re-enabled');
            }
        }

        // Drag and drop support
        const fileLabel = document.querySelector('.file-input-label');
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = '#eff6ff';
            fileLabel.style.borderColor = '#2563eb';
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = '#f8fafc';
            fileLabel.style.borderColor = '#cbd5e1';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = '#f8fafc';
            fileLabel.style.borderColor = '#cbd5e1';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
